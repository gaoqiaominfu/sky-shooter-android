<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>🚀 天空战记</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <!-- HUD -->
        <div class="hud">
            <div class="hud-item">
                <span class="hud-label">得分</span>
                <span class="hud-value" id="scoreValue">0</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">生命</span>
                <span class="hud-value" id="livesValue">❤️❤️❤️</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">关卡</span>
                <span class="hud-value" id="levelValue">1</span>
            </div>
        </div>
        
        <!-- 开始界面 -->
        <div class="screen" id="startScreen">
            <h1 class="game-title">🚀 天空战记</h1>
            <p class="game-subtitle">保卫天空，消灭敌机！</p>
            <div class="controls-hint">
                <p>🖱️ 鼠标/触摸拖动飞机</p>
                <p>⌨️ 或按方向键/WASD 移动</p>
                <p>🔫 自动射击</p>
            </div>
            <button class="btn btn-primary" onclick="game.start()">开始游戏</button>
        </div>
        
        <!-- 游戏结束界面 -->
        <div class="screen" id="gameOverScreen" style="display: none;">
            <h1 class="game-over-title">GAME OVER</h1>
            <div class="final-score">
                <p>最终得分</p>
                <p class="score-number" id="finalScore">0</p>
            </div>
            <button class="btn btn-primary" onclick="game.restart()">再来一局</button>
        </div>
        
        <!-- 暂停界面 -->
        <div class="screen" id="pauseScreen" style="display: none;">
            <h1 class="pause-title">⏸️ 游戏暂停</h1>
            <button class="btn btn-primary" onclick="game.resume()">继续游戏</button>
        </div>
    </div>
    
    <script src="js/game.js"></script>
</body>
</html>
